name: Build EagleNet VPN APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          sdkmanager --install \
            "ndk;26.3.11579264" \
            "build-tools;34.0.0" \
            "platforms;android-34"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Cache gomobile toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/gomobile
            ~/.cache/go-build
          key: gomobile-${{ runner.os }}-${{ hashFiles('go/go.mod') }}
          restore-keys: |
            gomobile-${{ runner.os }}-

      # Install gomobile binaries into GOPATH/bin
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      # Pull all module deps including x/mobile into the module cache.
      # We use -goflags so gomobile can find x/mobile without a tool directive.
      - name: Download Go modules
        working-directory: go
        run: |
          go mod download
          go mod verify

      - name: gomobile init
        working-directory: go
        run: gomobile init

      - name: Build Go AAR (arm64)
        working-directory: go
        run: |
          mkdir -p ../android/app/libs
          gomobile bind \
            -target  android/arm64 \
            -ldflags "-s -w" \
            -o       ../android/app/libs/vpn.aar \
            -v \
            .

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.4

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eaglenet-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
