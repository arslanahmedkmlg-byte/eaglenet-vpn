name: Build EagleNet VPN APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Also allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest        # Free GitHub-hosted runner, x86_64 Linux
    timeout-minutes: 60           # gomobile first build is slow; 60 min is safe

    steps:

      # ── 1. Checkout your repo ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Go ──────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true             # caches ~/.cache/go-build between runs

      # ── 3. Install Java (needed by Gradle / Android build tools) ──────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Install Android SDK command-line tools ──────────────────────────
      #    setup-android does: downloads cmdline-tools, sets ANDROID_HOME,
      #    and puts sdkmanager/adb on PATH.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install Android NDK r26c and Build Tools via sdkmanager ────────
      #    gomobile needs the NDK to cross-compile Go cgo code for ARM64.
      #    Build-tools 34.0.0 is needed by Gradle to assemble the APK.
      - name: Install NDK and Build Tools
        run: |
          sdkmanager --install \
            "ndk;26.3.11579264" \
            "build-tools;34.0.0" \
            "platforms;android-34"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      # ── 6. Cache gomobile's prebuilt Android toolchains ───────────────────
      #    gomobile init downloads ~500 MB of prebuilt stdlibs for each
      #    Android ABI.  Caching this cuts subsequent builds from 15 min → 2 min.
      - name: Cache gomobile toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/gomobile
            ~/.cache/go-build
          key: gomobile-${{ runner.os }}-${{ hashFiles('go/go.mod') }}
          restore-keys: |
            gomobile-${{ runner.os }}-

      # ── 7. Install gomobile binary ─────────────────────────────────────────
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      # ── 8. Download Go module dependencies ────────────────────────────────
      #    tun2socks v2 pulls in gVisor, which is large.  go mod download
      #    caches everything in the module cache (covered by the go cache above).
      - name: Download Go modules
        working-directory: go
        run: go mod download

      # ── 9. gomobile init ───────────────────────────────────────────────────
      #    Builds the Go standard library for each Android ABI.
      #    Must run after NDK is installed and NDK_HOME is set.
      - name: gomobile init
        run: gomobile init

      # ── 10. Build Go library → vpn.aar ────────────────────────────────────
      #     -target android/arm64  → only build ARM64 (keeps build fast and
      #                              APK small; covers all modern Android phones)
      #     -ldflags "-s -w"       → strip debug info, shrinks the .so inside the AAR
      #     -o                     → write directly into app/libs where Gradle expects it
      - name: Build Go AAR (arm64)
        working-directory: go
        run: |
          mkdir -p ../android/app/libs
          gomobile bind \
            -target  android/arm64 \
            -ldflags "-s -w" \
            -o       ../android/app/libs/vpn.aar \
            -v \
            .

      # ── 11. Generate Gradle wrapper on the runner ─────────────────────────
      #    We do this in CI so no local Gradle/Android Studio install is needed.
      #    The runner already has Gradle available via SDKMAN or apt; if not we
      #    install it with the setup-gradle action which is the cleanest path.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.4

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      # ── 12. Build debug APK ────────────────────────────────────────────────
      #    assembleDebug compiles Kotlin, links the vpn.aar, packages everything
      #    into an APK signed with the debug keystore (safe to install directly).
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      # ── 13. Upload APK as downloadable artifact ────────────────────────────
      #    After the workflow finishes the APK appears under
      #    Actions → this run → Artifacts → eaglenet-debug-apk
      #    retention-days: 30 means it stays for 30 days before auto-delete.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eaglenet-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
